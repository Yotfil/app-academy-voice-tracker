<div class="max-w-[900px] mx-auto w-full">
  @if(!showResume()) {
  <p class="text-sm text-[color:var(--mat-sys-on-surface-variant)] mb-3 flex items-start gap-2">
    <mat-icon class="!text-base mt-0.5 flex-shrink-0">info</mat-icon>
    Tu progreso se guarda localmente en este navegador. Para ver tu historial diario, accedé siempre desde el mismo
    equipo y el mismo navegador.
  </p>
  }

  <div class="flex justify-end gap-2 mb-4">
    <button mat-stroked-button (click)="toggleView()">
      <mat-icon>{{ showResume() ? 'fitness_center' : 'bar_chart' }}</mat-icon>
      {{ showResume() ? 'Ver ejercicios' : 'Ver resumen' }}
    </button>

    <a href="https://docs.google.com/document/d/1okHms8PrLFGloIARy-op1ehXIrvc2-I3DE8RPAcsqX4/edit?tab=t.0#heading=h.nri65ahg7bil"
      target="_blank" rel="noopener noreferrer" mat-stroked-button color="primary">
      <mat-icon>description</mat-icon>
      Descripción ejercicios
    </a>
  </div>

  @if (showResume()) {
  <app-resume />
  } @else {
  <app-exercises />
  }
</div>
